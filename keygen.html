<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="font-family:sans-serif;padding:20px">
<h3>VAPID 金鑰產生器</h3>
<button id="b" style="padding:14px 22px;font-size:16px">產生金鑰</button>
<p style="font-size:13px;color:#666">產生後長按全選複製，存到備忘錄。用完請把這個檔案刪掉。</p>
<textarea id="o" style="width:100%;height:220px;font-size:12px" readonly></textarea>
<script>
document.getElementById('b').onclick = async function(){
  const o = document.getElementById('o');
  try {
    const kp = await crypto.subtle.generateKey({name:'ECDSA',namedCurve:'P-256'}, true, ['sign','verify']);
    const pub = await crypto.subtle.exportKey('raw', kp.publicKey);
    const priv = await crypto.subtle.exportKey('jwk', kp.privateKey);
    const b64u = b => btoa(String.fromCharCode.apply(null, new Uint8Array(b))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
    o.value = 'PUBLIC_KEY:\n' + b64u(pub) + '\n\nPRIVATE_KEY:\n' + priv.d;
  } catch(e){
    o.value = '產生失敗：' + e.message;
  }
};
</script>
</body>
</html>
